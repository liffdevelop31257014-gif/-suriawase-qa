<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>婚活 すり合わせ</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">

<h1>婚活 すり合わせ</h1>

<label>Q1 結婚したい理由は何ですか？</label>
<textarea id="q1" class="detail-textarea"></textarea>

<label>Q2 どんな夫婦になりたいですか？理想の夫婦像を教えてください。</label>
<textarea id="q2" class="detail-textarea"></textarea>

<label>Q3 前科はありますか？</label>
<label><input type="radio" name="q3">ある</label>
<label><input type="radio" name="q3">ない</label>

<label>Q4 借金はありますか？</label>
<label><input type="radio" name="q4">ない</label>
<textarea placeholder="その他"></textarea>

<label>Q5 障害、難病など健康上のことで伝えておくことはありますか？</label>
<label><input type="radio" name="q5">ない</label>
<textarea placeholder="その他"></textarea>

<label>Q6 宗教事情で事前に伝えておくことはありますか？</label>
<label><input type="radio" name="q6">ない</label>
<textarea placeholder="その他"></textarea>

<label>Q7 再婚の場合、離婚理由を教えてください。</label>
<label><input type="radio" name="q7">初婚</label>
<textarea placeholder="その他"></textarea>

<label>Q8 転勤や転職の予定はありますか？</label>
<label><input type="radio" name="q8">ある</label>
<label><input type="radio" name="q8">ない</label>

<label>Q9 子どもはほしいですか？</label>
<h3>1人目</h3>
<label><input type="radio" name="q9_1">自然妊娠でできるならほしい</label>
<label><input type="radio" name="q9_1">人工授精程度の不妊治療</label>
<label><input type="radio" name="q9_1">体外受精・顕微授精など</label>
<label><input type="radio" name="q9_1">養子をとりたい</label>
<label><input type="radio" name="q9_1">望まない</label>

<h3>2人目</h3>
<label><input type="radio" name="q9_2">自然妊娠でできるならほしい</label>
<label><input type="radio" name="q9_2">人工授精程度の不妊治療</label>
<label><input type="radio" name="q9_2">体外受精・顕微授精など</label>
<label><input type="radio" name="q9_2">養子をとりたい</label>
<label><input type="radio" name="q9_2">望まない</label>

<h3>3人目</h3>
<label><input type="radio" name="q9_3">自然妊娠でできるならほしい</label>
<label><input type="radio" name="q9_3">人工授精程度の不妊治療</label>
<label><input type="radio" name="q9_3">体外受精・顕微授精など</label>
<label><input type="radio" name="q9_3">養子をとりたい</label>
<label><input type="radio" name="q9_3">望まない</label>

<h3>4人目以上</h3>
<label><input type="radio" name="q9_4">自然妊娠でできるならほしい</label>
<label><input type="radio" name="q9_4">人工授精程度の不妊治療</label>
<label><input type="radio" name="q9_4">体外受精・顕微授精など</label>
<label><input type="radio" name="q9_4">養子をとりたい</label>
<label><input type="radio" name="q9_4">望まない</label>

<label>Q10 ブライダルチェックは受けたことがありますか？</label>
<label><input type="radio" name="q10">ある</label>
<label><input type="radio" name="q10">ない</label>

<label>Q11 結婚後の働き方はどうしたいですか？</label>
<label><input type="radio" name="q11">2人ともフルタイム</label>
<label><input type="radio" name="q11">その他</label>

<label>Q12 家事はどう分担したいですか？</label>
<label><input type="radio" name="q12">全て積極的にやりたい</label>
<label><input type="radio" name="q12">ほとんど相手にやってほしい</label>

<label>Q13 結婚後の支出割合はどうしたいですか？</label>
<label><input type="radio" name="q13">自分がほとんど払いたい</label>
<label><input type="radio" name="q13">収入差按分</label>
<label><input type="radio" name="q13">半々</label>
<textarea placeholder="その他"></textarea>

<label>Q18 次の家事の中で好きな順に選択してください。</label>
<div id="q18Ranking" class="ranking-group">
<button type="button" class="rank-option">料理</button>
<button type="button" class="rank-option">洗い物</button>
<button type="button" class="rank-option">掃除機をかける</button>
<button type="button" class="rank-option">水回りの掃除</button>
<button type="button" class="rank-option">片付け</button>
<button type="button" class="rank-option">洗濯機をまわしてから干すまで</button>
<button type="button" class="rank-option">干したものの取り込み</button>
<button type="button" class="rank-option">ゴミ捨て</button>
</div>

<label>Q20 家は買いたいですか？（全て選択）</label>
<label><input type="checkbox" name="q20">ずっと賃貸</label>
<label><input type="checkbox" name="q20">将来的には持ち家</label>
<label><input type="checkbox" name="q20">すでに持ち家</label>

<label>Q21 戸建て・マンション（全て選択）</label>
<label><input type="checkbox" name="q21">注文住宅で戸建て</label>
<label><input type="checkbox" name="q21">中古戸建て</label>
<label><input type="checkbox" name="q21">新築マンション</label>
<label><input type="checkbox" name="q21">中古マンション</label>

<label>Q22 家について、予算と住みたいエリア</label>
<textarea placeholder="予算"></textarea>
<textarea placeholder="エリア"></textarea>

<label>Q23 車は買いたいですか？</label>
<textarea placeholder="選択肢を実装"></textarea>

<label>Q24 ペットは飼いたいですか？</label>
<label><input type="radio" name="q24">飼いたくない</label>
<textarea placeholder="飼いたい場合"></textarea>

<label>Q25〜31 は同様の形式で実装してください。</label>

</div>
</body>
</html>
